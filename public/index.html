<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Court Reporting Workflow Manager | VoiceScript</title>
    <meta
      name="description"
      content="Manage court reporting jobs, reporter assignments, editor reviews, and payment calculations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Design tokens ────────────────────────────────────────────────────── */
      :root {
        --bg: #0f1117;
        --bg-card: #1a1d27;
        --bg-card-hover: #1e2131;
        --border: #2a2d3e;
        --accent: #6c63ff;
        --accent-light: #8b83ff;
        --accent-dim: rgba(108, 99, 255, 0.15);
        --success: #22c55e;
        --success-dim: rgba(34, 197, 94, 0.15);
        --warning: #f59e0b;
        --warning-dim: rgba(245, 158, 11, 0.15);
        --danger: #ef4444;
        --danger-dim: rgba(239, 68, 68, 0.15);
        --info: #3b82f6;
        --info-dim: rgba(59, 130, 246, 0.15);
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --text-faint: #475569;
        --radius: 10px;
        --radius-sm: 6px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        --transition: 0.2s ease;
      }

      /* ── Reset & base ─────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.6;
      }

      /* ── Layout ───────────────────────────────────────────────────────────── */
      header {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 60px;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(8px);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text);
        text-decoration: none;
      }

      .logo-icon {
        width: 28px;
        height: 28px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      #health-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-faint);
      }

      .dot.online {
        background: var(--success);
        box-shadow: 0 0 6px var(--success);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }

      /* ── Stats bar ────────────────────────────────────────────────────────── */
      .stats-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.25rem;
        text-align: center;
      }

      .stat-number {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--accent-light);
      }

      .stat-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 2px;
      }

      /* ── Section headers ──────────────────────────────────────────────────── */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
      }

      /* ── Buttons ──────────────────────────────────────────────────────────── */
      button {
        cursor: pointer;
        border: none;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        border-radius: var(--radius-sm);
        padding: 0.5rem 1rem;
        transition: all var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-light);
        transform: translateY(-1px);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent-light);
      }

      .btn-sm {
        padding: 0.3rem 0.75rem;
        font-size: 0.8rem;
      }

      .btn-danger {
        background: var(--danger-dim);
        color: var(--danger);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .btn-danger:hover {
        background: var(--danger);
        color: #fff;
      }

      /* ── Modal ────────────────────────────────────────────────────────────── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--transition);
      }

      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.75rem;
        width: 100%;
        max-width: 440px;
        box-shadow: var(--shadow);
        transform: translateY(16px);
        transition: transform var(--transition);
      }

      .modal-overlay.open .modal {
        transform: translateY(0);
      }

      .modal-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 1.25rem;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      input,
      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 0.6rem 0.85rem;
        font-family: inherit;
        font-size: 0.9rem;
        transition: border-color var(--transition);
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: var(--accent);
      }

      select option {
        background: var(--bg-card);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      /* ── Job table ────────────────────────────────────────────────────────── */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.2);
      }

      td {
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      .actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      /* ── Status badges ────────────────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 0.2rem 0.65rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .badge-NEW {
        background: var(--info-dim);
        color: var(--info);
        border: 1px solid rgba(59, 130, 246, 0.3);
      }
      .badge-ASSIGNED {
        background: var(--warning-dim);
        color: var(--warning);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .badge-TRANSCRIBED {
        background: var(--accent-dim);
        color: var(--accent-light);
        border: 1px solid rgba(108, 99, 255, 0.3);
      }
      .badge-REVIEWED {
        background: rgba(168, 85, 247, 0.15);
        color: #c084fc;
        border: 1px solid rgba(168, 85, 247, 0.3);
      }
      .badge-COMPLETED {
        background: var(--success-dim);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }

      /* ── Location badge ───────────────────────────────────────────────────── */
      .location-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      /* ── Empty / loading states ───────────────────────────────────────────── */
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-faint);
      }

      .empty-state-icon {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: var(--text-muted);
      }

      /* ── Toast ────────────────────────────────────────────────────────────── */
      #toast-container {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        z-index: 300;
      }

      .toast {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: var(--radius-sm);
        padding: 0.75rem 1rem;
        font-size: 0.85rem;
        box-shadow: var(--shadow);
        max-width: 320px;
        animation: slideIn 0.2s ease;
      }

      .toast.error {
        border-left-color: var(--danger);
      }
      .toast.success {
        border-left-color: var(--success);
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* ── Payment detail ───────────────────────────────────────────────────── */
      .payment-info {
        font-size: 0.82rem;
        color: var(--text-muted);
      }

      .payment-total {
        color: var(--success);
        font-weight: 600;
      }

      /* ── Responsive ───────────────────────────────────────────────────────── */
      @media (max-width: 768px) {
        main {
          padding: 1rem;
        }

        .hide-mobile {
          display: none;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Header ─────────────────────────────────────────────────────────── -->
    <header>
      <a href="/" class="logo">
        <div class="logo-icon">⚖️</div>
        <span>WorkflowManager</span>
      </a>
      <div class="header-right">
        <div id="health-indicator">
          <div class="dot" id="health-dot"></div>
          <span id="health-text">Connecting…</span>
        </div>
        <button class="btn-primary" id="new-job-btn">+ New Job</button>
      </div>
    </header>

    <!-- ── Main ──────────────────────────────────────────────────────────── -->
    <main>
      <!-- Stats -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">–</div>
          <div class="stat-label">Total Jobs</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-new">–</div>
          <div class="stat-label">New</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-assigned">–</div>
          <div class="stat-label">Assigned</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-transcribed">–</div>
          <div class="stat-label">Transcribed</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-reviewed">–</div>
          <div class="stat-label">Reviewed</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-completed">–</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <!-- Job list -->
      <div class="section-header">
        <h1 class="section-title">Jobs</h1>
        <button class="btn-ghost btn-sm" id="refresh-btn">↻ Refresh</button>
      </div>

      <div class="card">
        <div id="jobs-container" class="loading">Loading jobs…</div>
      </div>
    </main>

    <!-- ── Create Job Modal ────────────────────────────────────────────── -->
    <div class="modal-overlay" id="create-modal">
      <div class="modal">
        <h2 class="modal-title">Create New Job</h2>
        <form id="create-form" novalidate>
          <div class="form-group">
            <label for="caseName">Case Name</label>
            <input
              id="caseName"
              name="caseName"
              type="text"
              placeholder="e.g. Smith v. Jones — Deposition"
              required
            />
          </div>
          <div class="form-group">
            <label for="durationMin">Duration (minutes)</label>
            <input id="durationMin" name="durationMin" type="number" min="1" placeholder="60" required />
          </div>
          <div class="form-group">
            <label for="locationType">Location Type</label>
            <select id="locationType" name="locationType">
              <option value="REMOTE">Remote</option>
              <option value="PHYSICAL">Physical</option>
            </select>
          </div>
          <div class="form-group" id="city-group" style="display: none">
            <label for="city">City</label>
            <input id="city" name="city" type="text" placeholder="e.g. Jakarta" />
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-ghost" id="cancel-create-btn">Cancel</button>
            <button type="submit" class="btn-primary" id="submit-create-btn">Create Job</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Assign Editor Modal ─────────────────────────────────────────── -->
    <div class="modal-overlay" id="assign-editor-modal">
      <div class="modal">
        <h2 class="modal-title">Assign Editor</h2>
        <div class="form-group">
          <label for="editor-select">Select Editor</label>
          <select id="editor-select"></select>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" id="cancel-editor-btn">Cancel</button>
          <button class="btn-primary" id="confirm-editor-btn">Assign</button>
        </div>
      </div>
    </div>

    <!-- ── Toast container ─────────────────────────────────────────────── -->
    <div id="toast-container"></div>

    <script>
      // ── API helpers ──────────────────────────────────────────────────────────
      const API = '/api';

      async function apiFetch(path, options = {}) {
        const res = await fetch(API + path, {
          headers: { 'Content-Type': 'application/json' },
          ...options,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
      }

      // ── Toast ────────────────────────────────────────────────────────────────
      function showToast(msg, type = 'default') {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 4000);
      }

      // ── Health check ─────────────────────────────────────────────────────────
      async function checkHealth() {
        try {
          await apiFetch('/health');
          document.getElementById('health-dot').classList.add('online');
          document.getElementById('health-text').textContent = 'API Online';
        } catch {
          document.getElementById('health-text').textContent = 'API Offline';
        }
      }

      // ── Status badge helper ───────────────────────────────────────────────────
      function statusBadge(status) {
        return `<span class="badge badge-${status}">${status}</span>`;
      }

      // ── Stats ─────────────────────────────────────────────────────────────────
      function updateStats(jobs) {
        const counts = { NEW: 0, ASSIGNED: 0, TRANSCRIBED: 0, REVIEWED: 0, COMPLETED: 0 };
        jobs.forEach((j) => counts[j.status]++);
        document.getElementById('stat-total').textContent = jobs.length;
        document.getElementById('stat-new').textContent = counts.NEW;
        document.getElementById('stat-assigned').textContent = counts.ASSIGNED;
        document.getElementById('stat-transcribed').textContent = counts.TRANSCRIBED;
        document.getElementById('stat-reviewed').textContent = counts.REVIEWED;
        document.getElementById('stat-completed').textContent = counts.COMPLETED;
      }

      // ── Render jobs table ─────────────────────────────────────────────────────
      function renderJobs(jobs) {
        const container = document.getElementById('jobs-container');

        if (jobs.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <p>No jobs yet. Create your first job to get started.</p>
            </div>`;
          return;
        }

        const rows = jobs
          .map((job) => {
            const payment = job.payment
              ? `<span class="payment-total">Rp ${job.payment.totalPayout.toLocaleString()}</span>`
              : '—';

            const locationIcon = job.locationType === 'PHYSICAL' ? '🏢' : '🌐';
            const locationText = job.city
              ? `${locationIcon} ${job.locationType} · ${job.city}`
              : `${locationIcon} ${job.locationType}`;

            const nextStatuses = getNextStatuses(job.status);
            const advanceBtn =
              nextStatuses.length > 0
                ? `<button class="btn-ghost btn-sm" onclick="advanceStatus('${job.id}', '${nextStatuses[0]}')">→ ${nextStatuses[0]}</button>`
                : '';

            const reporterCol = job.reporter
              ? `<span>${job.reporter.name}</span><br><small style="color:var(--text-faint)">${job.reporter.city}</small>`
              : job.status === 'NEW'
              ? `<button class="btn-ghost btn-sm" onclick="assignReporter('${job.id}')">Auto-assign</button>`
              : '—';

            const editorCol = job.editor
              ? `<span>${job.editor.name}</span>`
              : job.status === 'TRANSCRIBED' || job.status === 'REVIEWED' || job.status === 'COMPLETED'
              ? `<button class="btn-ghost btn-sm" onclick="openAssignEditor('${job.id}')">Assign Editor</button>`
              : '—';

            const paymentBtn =
              job.reporter && job.status !== 'NEW'
                ? `<button class="btn-ghost btn-sm" onclick="calcPayment('${job.id}')">💰 Pay</button>`
                : '';

            return `
            <tr>
              <td>
                <strong>${escHtml(job.caseName)}</strong><br>
                <small style="color:var(--text-faint)">${job.durationMin} min · <span class="location-badge">${locationText}</span></small>
              </td>
              <td>${statusBadge(job.status)}</td>
              <td class="hide-mobile">${reporterCol}</td>
              <td class="hide-mobile">${editorCol}</td>
              <td class="hide-mobile">${payment}</td>
              <td>
                <div class="actions">
                  ${advanceBtn}
                  ${paymentBtn}
                </div>
              </td>
            </tr>`;
          })
          .join('');

        container.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Job</th>
                <th>Status</th>
                <th class="hide-mobile">Reporter</th>
                <th class="hide-mobile">Editor</th>
                <th class="hide-mobile">Payout</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      }

      // ── State machine helpers (mirrors the backend) ────────────────────────────
      const TRANSITIONS = {
        NEW: ['ASSIGNED'],
        ASSIGNED: ['TRANSCRIBED'],
        TRANSCRIBED: ['REVIEWED'],
        REVIEWED: ['COMPLETED'],
        COMPLETED: [],
      };

      function getNextStatuses(status) {
        return TRANSITIONS[status] ?? [];
      }

      // ── Data loader ────────────────────────────────────────────────────────────
      async function loadJobs() {
        const container = document.getElementById('jobs-container');
        try {
          const jobs = await apiFetch('/jobs');
          updateStats(jobs);
          renderJobs(jobs);
        } catch (err) {
          container.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">Failed to load jobs: ${err.message}</p></div>`;
        }
      }

      // ── Actions ────────────────────────────────────────────────────────────────
      async function advanceStatus(jobId, targetStatus) {
        try {
          await apiFetch(`/jobs/${jobId}/status`, {
            method: 'PATCH',
            body: JSON.stringify({ status: targetStatus }),
          });
          showToast(`Status updated to ${targetStatus}`, 'success');
          loadJobs();
        } catch (err) {
          showToast(err.message, 'error');
        }
      }

      async function assignReporter(jobId) {
        try {
          const job = await apiFetch(`/jobs/${jobId}/assign-reporter`, { method: 'POST' });
          showToast(`Reporter assigned: ${job.reporter.name}`, 'success');
          loadJobs();
        } catch (err) {
          showToast(err.message, 'error');
        }
      }

      async function calcPayment(jobId) {
        try {
          const payment = await apiFetch(`/jobs/${jobId}/payment`);
          showToast(
            `Payment calculated: Rp ${payment.totalPayout.toLocaleString()} total`,
            'success',
          );
          loadJobs();
        } catch (err) {
          showToast(err.message, 'error');
        }
      }

      // ── Assign editor modal ────────────────────────────────────────────────────
      let pendingEditorJobId = null;

      async function openAssignEditor(jobId) {
        pendingEditorJobId = jobId;
        try {
          const editors = await apiFetch('/editors');
          const available = editors.filter((e) => e.available);
          const select = document.getElementById('editor-select');
          select.innerHTML = available
            .map((e) => `<option value="${e.id}">${e.name} — Rp ${e.flatFee.toLocaleString()}/job</option>`)
            .join('');
          if (available.length === 0) {
            select.innerHTML = '<option disabled>No available editors</option>';
          }
          openModal('assign-editor-modal');
        } catch (err) {
          showToast(err.message, 'error');
        }
      }

      document.getElementById('confirm-editor-btn').addEventListener('click', async () => {
        const editorId = document.getElementById('editor-select').value;
        if (!editorId || !pendingEditorJobId) return;
        try {
          await apiFetch(`/jobs/${pendingEditorJobId}/assign-editor`, {
            method: 'POST',
            body: JSON.stringify({ editorId }),
          });
          showToast('Editor assigned successfully', 'success');
          closeModal('assign-editor-modal');
          loadJobs();
        } catch (err) {
          showToast(err.message, 'error');
        }
      });

      document.getElementById('cancel-editor-btn').addEventListener('click', () =>
        closeModal('assign-editor-modal'),
      );

      // ── Create job modal ───────────────────────────────────────────────────────
      document.getElementById('new-job-btn').addEventListener('click', () =>
        openModal('create-modal'),
      );
      document.getElementById('cancel-create-btn').addEventListener('click', () =>
        closeModal('create-modal'),
      );

      // Show/hide city field based on location type
      document.getElementById('locationType').addEventListener('change', (e) => {
        const cityGroup = document.getElementById('city-group');
        cityGroup.style.display = e.target.value === 'PHYSICAL' ? 'block' : 'none';
      });

      document.getElementById('create-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const locationType = form.locationType.value;
        const body = {
          caseName: form.caseName.value.trim(),
          durationMin: parseInt(form.durationMin.value, 10),
          locationType,
        };
        if (locationType === 'PHYSICAL') {
          body.city = form.city.value.trim();
        }

        const submitBtn = document.getElementById('submit-create-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating…';

        try {
          await apiFetch('/jobs', { method: 'POST', body: JSON.stringify(body) });
          showToast('Job created successfully', 'success');
          closeModal('create-modal');
          form.reset();
          document.getElementById('city-group').style.display = 'none';
          loadJobs();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Job';
        }
      });

      // ── Modal helpers ──────────────────────────────────────────────────────────
      function openModal(id) {
        document.getElementById(id).classList.add('open');
      }

      function closeModal(id) {
        document.getElementById(id).classList.remove('open');
      }

      // Close modal on backdrop click
      document.querySelectorAll('.modal-overlay').forEach((overlay) => {
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) overlay.classList.remove('open');
        });
      });

      // ── Utility ────────────────────────────────────────────────────────────────
      function escHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // ── Refresh button ─────────────────────────────────────────────────────────
      document.getElementById('refresh-btn').addEventListener('click', loadJobs);

      // ── Init ───────────────────────────────────────────────────────────────────
      checkHealth();
      loadJobs();
    </script>
  </body>
</html>
